    <h1>20260103 优秀基因 ？？</h1>
    <p class="post-date">2026-01-03</p>
    <div class="post-body">
      <p>有人建议我快成家生娃把“优秀”基因传下去。我曾经也是这样想的。但这本质上是自恋。现不执着于此，一是对自己“祛魅”了，二是觉得世界上需要好人不需要所谓强者，三是这事儿是两个人的事儿，哪轮得到我自己决定？不执着于此之后，视野开阔了，爱也纯粹了。纯粹的爱才可以滋养出健康快乐的新生命。</p>
