    <h1>20260207 情深不寿</h1>
    <p class="post-date">2026-02-07</p>
    <div class="post-body">
      <p>上头的一方往往把“深情”作为人设，所作所为看似“为对方”实则“为自己”，要么满足自恋的需求，要么暗自期待回应。而落空的回应难免异化成负面情绪，要么进而向内转化成焦虑消耗自己，要么进而外化转化成愤怒消耗对方。能量耗散了，关系就终究了。是为“情深不寿”。</p>
